<div class="signup-container">
  <mat-card class="small-card">
    <mat-card-header>
      <h1>Signup</h1>
    </mat-card-header>
    <mat-card-content>

      <mat-form-field class="full-width"><mat-label>Name</mat-label>
        <input matInput [(ngModel)]="name"></mat-form-field>

      <mat-form-field class="full-width"><mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email"></mat-form-field>

      <mat-form-field class="full-width"><mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password"></mat-form-field>

      <mat-form-field class="full-width"><mat-label>Repeat Password</mat-label>
        <input matInput type="password" [(ngModel)]="repeat"></mat-form-field>

      <mat-form-field class="full-width"><mat-label>Phone</mat-label>
        <input matInput [(ngModel)]="phone"></mat-form-field>

      <mat-form-field class="full-width"><mat-label>Address</mat-label>
        <input matInput [(ngModel)]="address"></mat-form-field>

      

    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="doSignup()">
        <mat-icon>person_add</mat-icon> Signup
      </button>

      <a routerLink="/login" mat-button>
        <mat-icon>login</mat-icon> Login Instead
      </a>
    </mat-card-actions>
  </mat-card>
</div>
