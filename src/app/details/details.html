<div *ngIf="!loading() && toy()" class="details-container">
  <mat-card class="toy-detail-card">

   
    <img class="toy-img" [src]="getImageUrl()" [alt]="toy()?.name" />

    <mat-card-content>
      <h2>{{toy()?.name}}</h2>

      <p><b>Opis:</b> {{toy()?.description}}</p>
      <p><b>Tip:</b> {{ toy()?.type?.name }}</p>
      <p><b>Uzrast:</b> {{ toy()?.ageGroup?.name }}</p>
      <p><b>Ciljna grupa:</b> {{toy()?.targetGroup}}</p>
      <p><b>Datum proizvodnje:</b> {{toy()?.productionDate}}</p>
      <p><b>Cena:</b> {{toy()?.price}} RSD</p>
     
        

    </mat-card-content>

    

    <mat-card-actions>
      <button mat-button (click)="orderToy()">
        <mat-icon>shopping_cart</mat-icon> Order
      </button>
    </mat-card-actions>
  </mat-card>
</div>
