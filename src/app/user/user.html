<div class="user-container" *ngIf="activeUser; else loading">
  
  
  <mat-card class="user-card">
    <mat-card-header>
      <h2>User Profile</h2>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field class="full-width">
        <mat-label>First Name</mat-label>
        <input matInput type="text" [(ngModel)]="activeUser.firstName">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Last Name</mat-label>
        <input matInput type="text" [(ngModel)]="activeUser.lastName">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Address</mat-label>
        <input matInput type="text" [(ngModel)]="activeUser.address">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Phone Number</mat-label>
        <input matInput type="text" [(ngModel)]="activeUser.phone">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Favorite Toys</mat-label>
        <mat-select multiple [(ngModel)]="activeUser.favoriteToys">
          <mat-option *ngFor="let t of availableToys" [value]="t">{{t}}</mat-option>
        </mat-select>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="updateUser()">
        <mat-icon>save</mat-icon> Save Changes
      </button>
    </mat-card-actions>
  </mat-card>

  
  <mat-card class="user-card">
    <mat-card-header>
      <h2>General Information</h2>
    </mat-card-header>
    <mat-card-content>
      <div class="user-info">
        <img [src]="getAvatarUrl()" class="user-img">
        <div>
          <p><strong>Email:</strong> {{activeUser.email}}</p>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  
  <mat-card class="user-card">
    <mat-card-header>
      <h2>Change Password</h2>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field class="full-width">
        <mat-label>Old Password</mat-label>
        <input matInput type="password" [(ngModel)]="oldPassword">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>New Password</mat-label>
        <input matInput type="password" [(ngModel)]="newPassword">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Repeat Password</mat-label>
        <input matInput type="password" [(ngModel)]="passRepeat">
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="accent" (click)="updatePassword()">
        <mat-icon>password</mat-icon> Update Password
      </button>
    </mat-card-actions>
  </mat-card>

</div>

<ng-template #loading>
  <p>Loading user profile...</p>
</ng-template>
