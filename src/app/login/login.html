<div class="login-container">
  <mat-card class="small-card">
    <mat-card-header>
      <h1>Login</h1>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email" placeholder="user@example.com">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [(ngModel)]="password" placeholder="user123">
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" type="button" (click)="doLogin()">
        <mat-icon>login</mat-icon> Submit
      </button>

      <a routerLink="/signup" mat-button>
        <mat-icon>person_add</mat-icon> Signup Instead
      </a>
    </mat-card-actions>
  </mat-card>
</div>
