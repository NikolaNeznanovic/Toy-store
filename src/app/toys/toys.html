<div class="toys-container">
  <mat-card *ngFor="let toy of toys" class="toy-card">
    <mat-card-content>
      <img [src]="getImageUrl(toy)" (error)="onImageError($event)" alt="{{ toy.name }}" class="toy-img">
      <h2>{{ toy.name }}</h2>
      <p>{{ toy.price }} RSD</p>
    </mat-card-content>
    <mat-card-actions>
      <a [routerLink]="['/details', toy.toyId]" mat-button>
        <mat-icon>description</mat-icon> Details
      </a>
      <a [routerLink]="['/details', toy.toyId, 'order']" mat-button *ngIf="authService.isLoggedIn()">
        <mat-icon>shopping_cart</mat-icon> Order
      </a>
    </mat-card-actions>
  </mat-card>
</div>
